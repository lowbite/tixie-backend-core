quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER}
quarkus.datasource.password=${POSTGRES_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB}

# Liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

# Keycloak / OIDC
quarkus.oidc.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180/realms/tixie}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:tixie-browser}
quarkus.oidc.application-type=service

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=bearerAuth
quarkus.smallrye-openapi.jwt-bearer-format=JWT
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true
